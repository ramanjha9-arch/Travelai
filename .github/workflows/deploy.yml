cat > /home/claude/travelbuddy-deploy/.github/workflows/deploy.yml << 'EOF'
name: Deploy TravelBuddy AI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Gemini API Key from GitHub Secret
        run: |
          echo "🔑 Injecting Gemini API key..."
          sed -i 's|content="REPLACE_ME_WITH_KEY"|content="${{ secrets.GEMINI_API_KEY }}"|g' index.html
          echo "✅ Key injected"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
