name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Before Replace
        run: |
          grep "YOUR_GEMINI_API_KEY_HERE" index.html || echo "Placeholder NOT found"

      - name: Inject API Key
        run: |
          API_KEY="${{ secrets.GEMINI_API_KEY }}"
          sed -i "s|YOUR_GEMINI_API_KEY_HERE|$API_KEY|g" index.html

      - name: Debug After Replace
        run: |
          grep "AIza" index.html || echo "API key NOT injected"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
