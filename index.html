// ── 1. API KEY MANAGEMENT ─────────────────────────────
// Priority: 1) <meta> tag injected by GitHub Actions  2) localStorage  3) Web Crawl
function getKey() {
  const meta = document.querySelector('meta[name="gemini-api-key"]');
  if (meta && meta.content && meta.content.startsWith('AIza')) return meta.content;
  return localStorage.getItem('tb_key') || null;
}

function onKeyType() {
  const v = document.getElementById('key-inp').value.trim();
  document.getElementById('save-btn').disabled = v.length < 5;
}

function saveKey() {
  const v = document.getElementById('key-inp').value.trim();
  if (!v) { toast('⚠️ Paste your Gemini API key first', 'warn'); return; }
  if (!v.startsWith('AIza')) { toast('⚠️ Key should start with AIzaSy…', 'warn'); return; }
  localStorage.setItem('tb_key', v);
  updateBanner();
  toast('🟢 Gemini AI activated!');
}

function clearKey() {
  localStorage.removeItem('tb_key');
  document.getElementById('key-inp').value = '';
  updateBanner();
  toast('🕸️ Key cleared. Web Crawl Fallback active.');
}

// ── 2. GEMINI MODELS (updated list) ──────────────────
// Primary: 2.5 Flash Preview → Fallback1: 2.5 Flash Lite Preview → Fallback2: 1.5 Flash
const MODELS = [
  'gemini-2.5-flash-preview-05-20',       // Primary: Gemini 2.5 Flash Preview
  'gemini-2.5-flash-lite-preview-06-17',  // Fallback 1: Gemini 2.5 Flash Lite Preview
  'gemini-1.5-flash',                      // Fallback 2: Stable
];

async function callGemini(prompt, sys, idx = 0) {
  const key = getKey();
  if (!key) throw new Error('NO_KEY');
  const model = MODELS[Math.min(idx, MODELS.length - 1)];
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: sys }] },
      contents: [{ role: 'user', parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 8192 },
    }),
    signal: AbortSignal.timeout(60000),
  });
  if (res.status === 429 && idx < MODELS.length - 1) {
    console.warn(`[AI] ${model} rate limited → trying next model`);
    return callGemini(prompt, sys, idx + 1);
  }
  if (!res.ok) {
    const t = await res.text();
    if (idx < MODELS.length - 1) return callGemini(prompt, sys, idx + 1);
    throw new Error(`Gemini ${res.status}: ${t.slice(0,150)}`);
  }
  const d = await res.json();
  const txt = d?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!txt) throw new Error('Empty Gemini response');
  return txt;
}

function xJ(raw) {
  let s = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const a = s.indexOf('{'), b = s.lastIndexOf('}');
  if (a !== -1 && b > a) s = s.slice(a, b + 1);
  return s;
}

let fbUsed = false;

async function fetchWiki(dest) {
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(dest + ' tourism')}`, { signal: AbortSignal.timeout(7000) });
    if (r.ok) { const d = await r.json(); if (d.extract) return d.extract; }
    const r2 = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(dest)}`, { signal: AbortSignal.timeout(7000) });
    if (r2.ok) { const d2 = await r2.json(); return d2.extract || ''; }
  } catch {}
  return '';
}

async function generateTrip() {
  const from   = document.getElementById('f-from').value.trim();

  const budget = parseInt(document.getElementById('brng').value) || 50000;
  const start  = document.getElementById('f-start').value;
  const end    = document.getElementById('f-end').value;
  const days   = Math.max(1, Math.ceil((new Date(end) - new Date(start)) / 86400000));
  if (!dest) { toast('⚠️ Enter a destination', 'warn'); return; }

  document.getElementById('lov').classList.add('on');
  document.getElementById('lov-title').textContent = getKey() ? 'Gemini 2.5 Flash planning…' : 'Web Crawl Mode…';
  document.getElementById('lov-sub').textContent   = getKey() ? 'Gemini 2.5 Flash is working' : 'Fetching live travel data';
  fbUsed = false;

  const prefs = {
    budget, destination: dest, sourceCity: from, tripType,
    travelers: { adults, children: kids, infants: 0 },
    startDate: start, endDate: end, duration: days,
    hotelType: hotelP, foodPreference: foodP, travelPace: paceP,
    activityIntensity: actP, flightPreference: flightP, visaPreference: visaP,
    interests: selInts,
  };

  try {
    if (getKey()) {
      const sys = `You are TravelBuddy AI. Return ONLY valid JSON. No markdown. No text outside JSON. Use realistic INR prices and real airline/hotel names.`;
      const month = new Date(start).toLocaleString('default', { month: 'long' });
      const raw = await callGemini(buildPrompt(prefs, days, month), sys);
      IT = JSON.parse(xJ(raw));
      IT._source = 'gemini';
    } else throw new Error('NO_KEY');
  } catch (e) {
    if (e.message !== 'NO_KEY') console.warn('[Fallback triggered]', e.message);
    IT = await webCrawl(prefs);
  }

  IT.id = 'trip_' + Date.now();
  IT.shareToken = Math.random().toString(36).slice(2, 16);
  IT.createdAt = new Date().toISOString();
  IT.duration = IT.duration || days;

  document.getElementById('lov').classList.remove('on');
  renderResult();
  toast(fbUsed ? '🕸️ Web crawl plan ready!' : '🎉 AI itinerary ready!');
}

// ── 5. PDF EXPORT ─────────────────────────────────────
async function downloadPDF() {
  if (!IT) { toast('⚠️ No itinerary to export', 'warn'); return; }
  const btn = document.getElementById('pdf-btn');
  btn.textContent = '⏳ Generating PDF…';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, ml = 15, mr = 195, lh = 7;
    let y = 20;

    const addLine = (txt, size = 11, bold = false, color = [30,30,30]) => {
      if (y > 275) { doc.addPage(); y = 20; }
      doc.setFontSize(size);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.setTextColor(...color);
      doc.text(txt, ml, y);
      y += lh;
    };

    const addWrapped = (txt, size = 10, maxW = 170) => {
      doc.setFontSize(size);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(60, 60, 60);
      const lines = doc.splitTextToSize(String(txt || ''), maxW);
      lines.forEach(line => {
        if (y > 275) { doc.addPage(); y = 20; }
        doc.text(line, ml, y);
        y += 6;
      });
    };

    const addSection = (title) => {
      y += 4;
      if (y > 265) { doc.addPage(); y = 20; }
      doc.setFillColor(249, 115, 22);
      doc.rect(ml, y - 5, mr - ml, 8, 'F');
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(255, 255, 255);
      doc.text(title, ml + 3, y);
      y += 8;
    };

    const addHR = () => {
      doc.setDrawColor(220, 220, 220);
      doc.line(ml, y, mr, y);
      y += 4;
    };

    // ── COVER ──
    doc.setFillColor(10, 15, 30);
    doc.rect(0, 0, W, 80, 'F');
    doc.setFillColor(249, 115, 22);
    doc.rect(0, 78, W, 3, 'F');

    doc.setFontSize(28);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(249, 115, 22);
    doc.text('TravelBuddy AI', W/2, 28, { align: 'center' });

    doc.setFontSize(16);
    doc.setTextColor(255, 255, 255);
    doc.text(`${IT.sourceCity} → ${IT.destination}`, W/2, 42, { align: 'center' });

    doc.setFontSize(11);
    doc.setTextColor(200, 200, 200);
    doc.text(`${IT.duration} days  •  Budget: ₹${(IT.totalBudget||0).toLocaleString('en-IN')}`, W/2, 52, { align: 'center' });
    doc.text(`Generated: ${new Date(IT.createdAt||Date.now()).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`, W/2, 60, { align: 'center' });

    doc.setFontSize(9);
    doc.setTextColor(150, 150, 150);
    doc.text('Built by Raman Jha  •  travelbuddy.ai', W/2, 73, { align: 'center' });

    y = 95;

    // ── SUMMARY ──
    if (IT.summary) {
      addLine('Trip Overview', 13, true, [30, 30, 30]);
      addWrapped(IT.summary);
      y += 3;
    }

    // ── BUDGET BREAKDOWN ──
    addSection('💰 Budget Breakdown');
    const b = IT.breakdown || {};
    Object.entries(b).filter(([k]) => k !== 'total').forEach(([k, v]) => {
      if (y > 275) { doc.addPage(); y = 20; }
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(50, 50, 50);
      const label = k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' ');
      doc.text(label, ml, y);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(249, 115, 22);
      doc.text(`₹${Number(v).toLocaleString('en-IN')}`, mr, y, { align: 'right' });
      y += 6;
    });
    addHR();
    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(249, 115, 22);
    doc.text('TOTAL', ml, y);
    doc.text(`₹${(b.total||IT.totalBudget||0).toLocaleString('en-IN')}`, mr, y, { align: 'right' });
    y += 10;

    // ── DAY BY DAY ──
    addSection('📅 Day-by-Day Itinerary');
    (IT.days || []).forEach(d => {
      if (y > 260) { doc.addPage(); y = 20; }
      doc.setFillColor(245, 247, 250);
      doc.rect(ml, y - 5, mr - ml, 9, 'F');
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(10, 15, 30);
      doc.text(`Day ${d.day}: ${d.title}`, ml + 3, y);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(100, 100, 100);
      doc.text(d.date || '', mr, y, { align: 'right' });
      y += 9;

      if (d.description) addWrapped(d.description, 10);

      if (d.activities?.length) {
        addLine('Activities:', 10, true, [80, 80, 80]);
        d.activities.forEach(a => {
          if (y > 270) { doc.addPage(); y = 20; }
          doc.setFontSize(10);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(30, 30, 30);
          doc.text(`  • ${a.name} (${a.type}) — ${a.duration}`, ml, y);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(249, 115, 22);
          doc.text(`₹${(a.cost||0).toLocaleString('en-IN')}`, mr, y, { align: 'right' });
          y += 6;
          if (a.description) {
            doc.setFontSize(9);
            doc.setFont('helvetica', 'italic');
            doc.setTextColor(100, 100, 100);
            const lines = doc.splitTextToSize(`    ${a.description}`, 165);
            lines.slice(0, 2).forEach(l => { if (y < 275) { doc.text(l, ml, y); y += 5; } });
          }
        });
      }

      if (d.meals?.length) {
        addLine('Meals:', 10, true, [80, 80, 80]);
        d.meals.forEach(m => {
          if (y > 275) { doc.addPage(); y = 20; }
          doc.setFontSize(9);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(60, 60, 60);
          const cap = m.type.charAt(0).toUpperCase() + m.type.slice(1);
          doc.text(`  ${cap}: ${m.restaurant} (${m.cuisine}) — ${m.recommendation}  •  ₹${m.cost||0}`, ml, y);
          y += 5.5;
        });
      }

      if (d.tips?.length) {
        addLine('Tips:', 9, true, [100, 100, 100]);
        d.tips.slice(0, 2).forEach(tip => { if (y < 275) { doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80); doc.text(`  ✓ ${tip}`, ml, y); y += 5; } });
      }

      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(249, 115, 22);
      doc.text(`Estimated Day Cost: ₹${(d.estimatedCost||0).toLocaleString('en-IN')}`, mr, y, { align: 'right' });
      y += 8;
      addHR();
    });

    // ── FLIGHTS ──
    addSection('✈️ Recommended Flights');
    (IT.flights || []).forEach(f => {
      if (y > 265) { doc.addPage(); y = 20; }
      addLine(`${f.airline} ${f.flightNumber||''} — ${f.from} → ${f.to}`, 11, true, [30,30,30]);
      doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
      doc.text(`Dep: ${f.departure}  Arr: ${f.arrival}  Duration: ${f.duration}  ${f.stops===0?'Non-stop':f.stops+' stop'}  ${f.class}`, ml, y);
      doc.setFont('helvetica','bold'); doc.setTextColor(249,115,22);
      doc.text(`₹${(f.price||0).toLocaleString('en-IN')}`, mr, y, { align:'right' });
      y += 5; doc.setFont('helvetica','normal'); doc.setTextColor(14,165,233);
      doc.text(f.bookingUrl||'', ml, y); y += 8;
    });

    // ── HOTELS ──
    addSection('🏨 Recommended Hotels');
    (IT.hotels || []).forEach(h => {
      if (y > 265) { doc.addPage(); y = 20; }
      addLine(`${h.name} (${h.type}) — ${'★'.repeat(h.stars||3)}`, 11, true, [30,30,30]);
      doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
      doc.text(`${h.location}  •  ${h.distance}  •  Rating: ${h.rating}  •  ${(h.reviews||0).toLocaleString()} reviews`, ml, y); y += 5;
      doc.text(`Amenities: ${(h.amenities||[]).join(', ')}`, ml, y);
      doc.setFont('helvetica','bold'); doc.setTextColor(249,115,22);
      doc.text(`₹${(h.pricePerNight||0).toLocaleString('en-IN')}/night  •  ₹${(h.totalPrice||0).toLocaleString('en-IN')} total`, mr, y, { align:'right' });
      y += 5; doc.setFont('helvetica','normal'); doc.setTextColor(14,165,233);
      doc.text(h.bookingUrl||'', ml, y); y += 8;
    });

    // ── VISA ──
    addSection('🛂 Visa & Weather');
    const v = IT.visa || {};
    addLine(`Visa: ${v.required ? 'Required' : 'Not Required'} — ${v.type||''}`, 11, true, [30,30,30]);
    if (v.cost !== undefined) { doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80); doc.text(`Cost: ${v.cost===0?'Free':'₹'+v.cost}  •  Processing: ${v.processingTime||''}  •  Validity: ${v.validity||''}`, ml, y); y += 5; }
    if (v.notes) addWrapped(v.notes, 9);
    y += 3;
    const w = IT.weather || {};
    if (w.destination) {
      addLine(`Weather: ${w.temperature?.min}°–${w.temperature?.max}°C  |  ${w.humidity} humidity  |  Best season: ${w.bestSeason}`, 10, false, [60,60,60]);
      addWrapped(w.description || '', 9);
    }

    // ── SAFETY TIPS ──
    addSection('💡 Travel Tips & Safety');
    (IT.tips || []).forEach(t => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30);
      doc.text(`• ${t.title}`, ml, y); y += 5;
      addWrapped(t.description, 9); y += 1;
    });

    // ── HIDDEN GEMS ──
    if (IT.hiddenGems?.length) {
      addSection('💎 Hidden Gems');
      IT.hiddenGems.forEach(g => {
        if (y > 265) { doc.addPage(); y = 20; }
        addLine(g.name, 11, true, [245,158,11]);
        addWrapped(g.description, 9);
        doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
        doc.text(`📍 ${g.location}  •  🕐 ${g.bestTime}  •  💰 ${g.cost}  •  📸 ${g.instagramScore}/10`, ml, y); y += 8;
      });
    }

    // ── EMERGENCY CONTACTS ──
    if (IT.emergencyContacts?.length) {
      addSection('🆘 Emergency Contacts');
      IT.emergencyContacts.forEach(c => {
        if (y > 275) { doc.addPage(); y = 20; }
        doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30);
        doc.text(`${c.name}:`, ml, y);
        doc.setFont('helvetica','normal'); doc.setTextColor(220,50,50);
        doc.text(c.number, ml+45, y); y += 6;
      });
    }

    // ── PACKING LIST ──
    if (IT.packingList?.length) {
      addSection('🎒 Packing Checklist');
      const cols = 3;
      const colW = (mr - ml) / cols;
      IT.packingList.forEach((item, i) => {
        if (y > 272) { doc.addPage(); y = 20; }
        const col = i % cols;
        const row = Math.floor(i / cols);
        if (col === 0 && i > 0 && row > 0) {}
        const xPos = ml + col * colW;
        if (col === 0) { if (i > 0) y += 0; }
        doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
        doc.text(`☐ ${item}`, xPos, y + (row % 1 === 0 && col === 0 ? 0 : 0));
        if (col === cols - 1 || i === IT.packingList.length - 1) y += 6;
      });
    }

    // ── LOCAL FOOD ──
    if (IT.localFood?.length) {
      addSection('🍜 Must-Try Local Food');
      IT.localFood.forEach(f => {
        if (y > 265) { doc.addPage(); y = 20; }
        addLine(`${f.name} ${f.mustTry?'★ Must Try':''} ${f.vegetarian?'(Veg)':''}`, 10, true, [30,30,30]);
        addWrapped(f.description, 9);
        doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
        doc.text(`💰 ${f.price}  •  📍 ${f.where}`, ml, y); y += 7;
      });
    }

    // ── FOOTER on last page ──
    const totalPages = doc.internal.getNumberOfPages();
    for (let i = 1; i <= totalPages; i++) {
      doc.setPage(i);
      doc.setFontSize(8);
      doc.setFont('helvetica','normal');
      doc.setTextColor(150,150,150);
      doc.text(`TravelBuddy AI  •  Built by Raman Jha  •  Page ${i} of ${totalPages}`, W/2, 290, { align:'center' });
    }

    const fileName = `TravelBuddy_${IT.destination.replace(/\s+/g,'-')}_${IT.duration}days.pdf`;
    doc.save(fileName);
    toast(`✅ PDF downloaded: ${fileName}`);
  } catch (err) {
    console.error('PDF error:', err);
    toast('❌ PDF failed: ' + err.message, 'error');
  }

  btn.textContent = '⬇️ Download PDF';
  btn.disabled = false;
}

// ── 6. RENDER RESULT ──────────────────────────────────
function renderResult() {
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  const it = IT;

  const fn = document.getElementById('fb-notice');
  if (it._source === 'webcrawl') {
    fn.innerHTML = `<div class="fb-banner"><span style="font-size:1.2rem;flex-shrink:0">🕸️</span><div><strong style="color:#c084fc">Web Crawl Mode</strong> — No Gemini key detected. Built from Wikipedia &amp; travel data. <span style="color:var(--or);cursor:pointer;text-decoration:underline" onclick="document.getElementById('key-inp').focus();window.scrollTo({top:0,behavior:'smooth'})">Add API key in top bar ↑</span> for fully personalised AI plans.</div></div>`;
    document.getElementById('r-credit').textContent = 'Web Crawl Fallback • Live data';
    document.getElementById('r-credit').style.color = '#c084fc';
    document.getElementById('r-dot').textContent = '🕸️';
  } else {
    fn.innerHTML = '';
    document.getElementById('r-credit').textContent = 'Gemini 2.5 Flash • AI-generated';
    document.getElementById('r-credit').style.color = '#4ade80';
    document.getElementById('r-dot').textContent = '✅';
  }

  document.getElementById('r-title').innerHTML = `${it.sourceCity} → <span class="grad">${it.destination}</span>`;
  document.getElementById('r-meta').textContent = `${it.duration} days • ₹${(it.totalBudget||0).toLocaleString('en-IN')} budget`;
  document.getElementById('r-sum').textContent = it.summary || '';

  buildItin(); buildBudget(); buildFlights(); buildHotels(); buildTips(); buildVisa(); buildPacking();
  rTab('itinerary');
}

function rTab(n) {
  document.querySelectorAll('.rtab').forEach(t => t.classList.toggle('on', t.getAttribute('onclick') === `rTab('${n}')`));
  document.querySelectorAll('.rpanel').forEach(p => p.classList.remove('on'));
  document.getElementById('tp-' + n).classList.add('on');
}

function buildItin() {
  const sb = (IT.days||[]).map((d,i) => `<button class="dbn${i===0?' on':''}" id="db${i}" onclick="selDay(${i})"><span class="dn">Day ${d.day}</span><span class="dt">${d.title}</span></button>`).join('');
  document.getElementById('tp-itinerary').innerHTML = `<div class="day-grid"><div class="day-sb"><p style="font-size:.68rem;color:var(--mu2);font-weight:600;text-transform:uppercase;margin-bottom:.65rem;padding:0 .4rem">Days</p>${sb}</div><div id="day-detail"></div></div>`;
  renderDay(0);
}

function selDay(i) { dayIdx = i; document.querySelectorAll('.dbn').forEach((b,j) => b.classList.toggle('on',j===i)); renderDay(i); }

function renderDay(i) {
  const d = IT.days?.[i]; if (!d) return;

let cs=1, tripType='india', adults=2, kids=0, selInts=[], hotelP='mid_range', foodP='any', paceP='moderate', actP='moderate', flightP='cheapest', visaP='any';
const INTS=[{id:'beach',l:'Beach',i:'🏖️'},{id:'mountain',l:'Mountains',i:'🏔️'},{id:'adventure',l:'Adventure',i:'🧗'},{id:'culture',l:'Culture',i:'🏛️'},{id:'food',l:'Food',i:'🍜'},{id:'nightlife',l:'Nightlife',i:'🎉'},{id:'honeymoon',l:'Honeymoon',i:'💑'},{id:'family',l:'Family',i:'👨‍👩‍👧‍👦'},{id:'solo',l:'Solo',i:'🧳'},{id:'spiritual',l:'Spiritual',i:'🕌'},{id:'luxury',l:'Luxury',i:'💎'},{id:'photography',l:'Photography',i:'📸'},{id:'shopping',l:'Shopping',i:'🛍️'},{id:'wildlife',l:'Wildlife',i:'🦁'},{id:'trekking',l:'Trekking',i:'🥾'},{id:'party',l:'Party',i:'🎊'}];
const PG={hotel:{pfx:'ht-',set:v=>hotelP=v},fd:{pfx:'fd-',set:v=>foodP=v},pc:{pfx:'pc-',set:v=>paceP=v},al:{pfx:'al-',set:v=>actP=v},fl:{pfx:'fl-',set:v=>flightP=v},vi:{pfx:'vi-',set:v=>visaP=v}};

function initForm() {
  const s=new Date();s.setDate(s.getDate()+30);const e=new Date(s);e.setDate(s.getDate()+7);
  const fmt=d=>d.toISOString().split('T')[0];
  document.getElementById('f-start').value=fmt(s);document.getElementById('f-end').value=fmt(e);
  document.getElementById('f-start').min=fmt(new Date());document.getElementById('f-end').min=fmt(s);
  document.getElementById('f-start').addEventListener('change',updDur);
  document.getElementById('f-end').addEventListener('change',updDur);
  updDur();
  document.getElementById('ig').innerHTML=INTS.map(i=>`<button class="ib" id="ib-${i.id}" onclick="togI('${i.id}')"><span class="ie">${i.i}</span><span class="il">${i.l}</span></button>`).join('');
}

function updDur(){const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;const p=document.getElementById('dpill');if(!s||!e){p.style.display='none';return;}const d=Math.ceil((new Date(e)-new Date(s))/86400000);if(d<=0){p.style.display='none';return;}p.style.display='flex';document.getElementById('dur-txt').textContent=`${d} day${d>1?'s':''} trip`;const fmt=x=>new Date(x).toLocaleDateString('en-IN',{day:'numeric',month:'short'});document.getElementById('dur-dt').textContent=`${fmt(s)} → ${fmt(e)}`;}
function updB(v){const n=parseInt(v);document.getElementById('bdsp').textContent=n>=100000?'₹'+(n/100000).toFixed(n%100000===0?0:1)+'L':'₹'+n.toLocaleString('en-IN');}
function setB(v){document.getElementById('brng').value=v;updB(v);}
function pD(n){document.getElementById('f-dest').value=n;document.querySelectorAll('[onclick^="pD("]').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick')===`pD('${n}')`));}
function selTT(t){tripType=t;document.getElementById('tt-india').classList.toggle('on',t==='india');document.getElementById('tt-intl').classList.toggle('on',t==='international');}
function chg(f,d){if(f==='adults'){adults=Math.max(1,Math.min(20,adults+d));document.getElementById('av').textContent=adults;}if(f==='children'){kids=Math.max(0,Math.min(10,kids+d));document.getElementById('cv').textContent=kids;}}
function togI(id){const btn=document.getElementById('ib-'+id);selInts=selInts.includes(id)?selInts.filter(x=>x!==id):[...selInts,id];btn.classList.toggle('on',selInts.includes(id));document.getElementById('sel-ints').innerHTML=selInts.map(x=>{const i=INTS.find(d=>d.id===x);return i?`<span class="tag tag-or">${i.i} ${i.l}</span>`:''}).join('');}
function sP(g,v){const gp=PG[g];if(!gp)return;gp.set(v);document.querySelectorAll(`[id^="${gp.pfx}"]`).forEach(b=>b.classList.toggle('on',b.id===gp.pfx+v));}
function goStep(n){if(n<1||n>4)return;document.getElementById('s'+cs).classList.remove('on');cs=n;document.getElementById('s'+n).classList.add('on');document.getElementById('prog').style.width=(n/4*100)+'%';document.getElementById('slc').textContent=`Step ${n} of 4`;document.getElementById('spct').textContent=(n/4*100)+'%';document.querySelectorAll('.slb').forEach((l,i)=>l.classList.toggle('on',i===n-1));document.getElementById('btn-back').style.visibility=n===1?'hidden':'visible';const nb=document.getElementById('btn-next');if(n===4){nb.textContent='✨ Generate My Trip!';nb.setAttribute('onclick','generateTrip()');}else{nb.textContent='Next Step →';nb.setAttribute('onclick','nextStep()');}window.scrollTo({top:document.getElementById('page-planner').offsetTop-65,behavior:'smooth'});}
function nextStep(){if(cs===1){if(!document.getElementById('f-dest').value.trim()){toast('⚠️ Enter destination','warn');return;}if(!document.getElementById('f-from').value.trim()){toast('⚠️ Enter source city','warn');return;}}if(cs===2){const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;if(!s||!e){toast('⚠️ Select travel dates','warn');return;}if(new Date(e)<=new Date(s)){toast('⚠️ End date must be after start','warn');return;}}goStep(cs+1);}

const QP=['🏖️ Plan 5-day Goa under ₹25k','💑 Honeymoon Bali ₹1 lakh','🌍 Budget Europe ₹2 lakhs','🏔️ Ladakh adventure ₹30k','🌴 Thailand 7 days ₹50k','🧘 Rishikesh retreat ₹12k'];
let chatH=[];

function initChat() {
  document.getElementById('qchips').innerHTML=QP.map(p=>`<button class="qchip" onclick="qS('${p.replace(/'/g,"\\'")}') ">${p}</button>`).join('');
  addMsg('ai',"✈️ Namaste! I'm TravelBuddy AI!\n\nI'm running in "+(getKey()?'🟢 Gemini AI mode':'🕸️ Web Crawl mode')+" right now.\n\nAsk me anything: budgets, destinations, visas, best time to visit.\n\nTry: \"Plan a 5-day Goa trip for 2 under ₹30,000\"");
}

function addMsg(r,txt){const box=document.getElementById('chat-msgs');const el=document.createElement('div');el.className=`cm ${r==='ai'?'ai':'usr'}`;const ts=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});el.innerHTML=r==='ai'?`<div class="cm-av">✈️</div><div><div class="cm-bub">${esc(txt)}</div><div class="cm-ts">${ts}</div></div>`:`<div><div class="cm-bub">${esc(txt)}</div><div class="cm-ts" style="text-align:right">${ts}</div></div>`;box.appendChild(el);box.scrollTop=box.scrollHeight;}
function addTyping(){const box=document.getElementById('chat-msgs');const el=document.createElement('div');el.className='cm ai';el.id='typing';el.innerHTML=`<div class="cm-av">✈️</div><div class="typing"><span></span><span></span><span></span></div>`;box.appendChild(el);box.scrollTop=box.scrollHeight;}
function rmTyping(){document.getElementById('typing')?.remove();}
function ckd(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
async function qS(t){document.getElementById('ci').value=t;await sendChat();}

async function sendChat() {
  const inp=document.getElementById('ci');const msg=inp.value.trim();if(!msg)return;
  inp.value='';inp.disabled=true;addMsg('user',msg);chatH.push({role:'user',content:msg});addTyping();
  const sys=`You are TravelBuddy AI — friendly expert travel assistant for Indian travellers. Be concise (under 250 words). Use bullet points. Always give INR prices.`;
  const conv=chatH.slice(-8).map(m=>`${m.role==='user'?'User':'TravelBuddy'}: ${m.content}`).join('\n');
  try {
    let reply;
    if(getKey()){reply=await callGemini(conv+'\nTravelBuddy:',sys);}
    else{reply=await wcChat(msg);}
    rmTyping();addMsg('ai',reply);chatH.push({role:'assistant',content:reply});
  } catch(e){rmTyping();addMsg('ai',getKey()?'Sorry, Gemini had an issue. Please try again.':await wcChat(msg));}
  inp.disabled=false;inp.focus();
}

async function wcChat(msg) {
  await new Promise(r=>setTimeout(r,500));
  const m=msg.toLowerCase();
  if(m.includes('goa'))return"🏖️ **Goa** — great choice!\n\n📅 Best time: Oct–Mar\n💰 Budget: ₹15k-25k/person (5 days)\n✈️ Flights from Mumbai: ₹2,500-4,000\n🏨 Hotels: ₹800-4,000/night\n\n🎯 Must-do:\n• Baga/Calangute beaches & water sports\n• Fort Aguada + Old Goa churches\n• Palolem for peaceful South Goa\n\n🍽️ Must eat: Fish curry rice, Bebinca, Solkadhi\n\nUse **Plan Trip** tab for full itinerary! ✨";
  if(m.includes('bali'))return"🌴 **Bali** — dream destination!\n\n📅 Best time: Apr–Oct\n💰 Budget: ₹45k-70k/person (7 days)\n🛂 Visa on arrival: USD 35 (≈₹2,900)\n✈️ Return flights from India: ₹18k-28k\n\n🎯 Must-do:\n• Tegallalang rice terraces at sunrise\n• Tanah Lot temple at sunset\n• Ubud Monkey Forest + art market\n\nHead to **Plan Trip** for full itinerary! ✈️";
  if(m.includes('budget')||m.includes('cheap'))return"💰 **Best budget destinations:**\n\n**Under ₹15k (5 days):** Rishikesh, Hampi, Coorg\n**Under ₹30k (7 days):** Goa, Manali, Andaman\n**Under ₹50k international:** Thailand, Vietnam, Sri Lanka\n\n💡 Fly Tue/Wed for cheapest fares!";
  if(m.includes('visa'))return"🛂 **Visa-free for Indians:**\n\n✅ No visa: Nepal, Bhutan, Maldives, Mauritius\n🏷️ On arrival: Bali (free), Maldives (free), Thailand (15d free)\n📝 e-Visa: Sri Lanka ($20), Vietnam ($25), Kenya ($50)";
  return`✈️ I can help plan any trip!\n\nCurrently in ${getKey()?'🟢 Gemini AI':'🕸️ Web Crawl'} mode.\n${getKey()?'':'💡 Add Gemini key in the orange bar at top for AI responses!\n\n'}Tell me: **Where + budget?**\n\nOr use **Plan Trip** tab for full itinerary! 🗺️`;
}

// ── 9. EXPLORE ────────────────────────────────────────

function initExplore(){
  const F=['All','India','International','Beach','Mountains','Culture','Adventure','Luxury','Budget'];
  document.getElementById('frow').innerHTML=F.map(f=>`<button class="filter-btn ${f==='All'?'on':''}" id="ef-${f}" onclick="setF('${f}')">${f==='India'?'🇮🇳 India':f==='International'?'✈️ International':f}</button>`).join('');
  renderExp('All');
}
function setF(f){document.querySelectorAll('[id^="ef-"]').forEach(b=>b.classList.toggle('on',b.id===`ef-${f}`));renderExp(f);}
function renderExp(f){const fl=f.toLowerCase();const list=DESTS.filter(d=>fl==='all'||d.tp===(fl==='international'?'intl':fl)||d.t.toLowerCase()===fl);document.getElementById('exp-grid').innerHTML=list.map(d=>`<button class="dc" onclick="pickD('${d.n}')"><span class="dc-em">${d.e}</span><div class="dc-name">${d.n}</div><div class="dc-ctry">${d.c}</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem"><span class="dc-price">${d.f}</span><span style="font-size:.73rem;color:#fbbf24">⭐ ${d.r}</span></div><div style="display:flex;gap:.35rem;flex-wrap:wrap"><span class="tag tag-or">${d.t}</span><span class="tag tag-wh">${d.d}d</span></div></button>`).join('');}
function pickD(n){document.getElementById('f-dest').value=n;nav('planner');}

function initHomeD(){document.getElementById('home-dests').innerHTML=DESTS.slice(0,8).map(d=>`<button class="dc" onclick="pickD('${d.n}')"><span class="dc-em">${d.e}</span><div class="dc-name">${d.n}</div><div class="dc-ctry">${d.c}</div><div class="dc-price">${d.f}</div><div style="margin-top:.55rem"><span class="tag tag-or">${d.t}</span></div></button>`).join('');}

function heroSearch(){const from=document.getElementById('h-from').value.trim();const to=document.getElementById('h-to').value.trim();const bgt=document.getElementById('h-bgt').value;if(from)document.getElementById('f-from').value=from;if(to)document.getElementById('f-dest').value=to;if(bgt){document.getElementById('brng').value=bgt;updB(bgt);}nav('planner');}

// ── 10. NAV ───────────────────────────────────────────
function nav(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tnav').forEach(l=>l.classList.remove('on'));document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('on'));document.getElementById('page-'+n).classList.add('on');document.querySelector(`.tnav[onclick*="'${n}'"]`)?.classList.add('on');document.getElementById('bn-'+n)?.classList.add('on');window.scrollTo({top:0,behavior:'smooth'});closeMob();}
function toggleMob(){document.getElementById('mob-menu').classList.toggle('on');}
function closeMob(){document.getElementById('mob-menu').classList.remove('on');}

// ── 11. UTILS ─────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}
let toastT;
function toast(msg,type='ok'){document.getElementById('t-ic').textContent=type==='warn'?'⚠️':type==='error'?'❌':'✅';document.getElementById('t-msg').textContent=msg;const el=document.getElementById('toast');el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),3500);}

// ── 12. INIT ──────────────────────────────────────────
(function init(){
  updateBanner();
  initForm();
  initHomeD();
  initExplore();
  initChat();
  // If localStorage has a key, pre-show it (masked) in the input
  const lk=localStorage.getItem('tb_key');
  if(lk){document.getElementById('key-inp').value=lk.slice(0,8)+'••••••••••••'+lk.slice(-4);document.getElementById('key-inp').classList.add('set');}
})();
</script>
